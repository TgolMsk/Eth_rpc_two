# Lua-free RPC method extraction via regex on request body
map $request_body $rpc_method {
    default                         "unknown";
    ~*"method"\s*:\s*"(?<m>[^"]+)"  $m;
}

# Block dangerous/admin methods
map $rpc_method $is_blocked_method {
    default         0;
    "admin_.*"      1;
    "personal_.*"   1;
    "miner_.*"      1;
    "debug_.*"      1;
    "clique_.*"     1;
    "les_.*"        1;
    "txpool_.*"     1;
}

# Cacheable methods — results that are immutable once confirmed
map $rpc_method $is_cacheable {
    default                             0;
    "eth_getBlockByHash"                1;
    "eth_getTransactionByHash"          1;
    "eth_getTransactionReceipt"         1;
    "eth_chainId"                       1;
    "net_version"                       1;
    "web3_clientVersion"                1;
}

server {
    listen 80;
    server_name _;

    # ======================== JSON-RPC (HTTP) ========================
    location / {
        # Must read body before we can inspect $rpc_method
        proxy_set_header Content-Type "application/json";

        # Rate limit
        limit_req zone=rpc_limit burst=50 nodelay;
        limit_req_status 429;

        # Block dangerous methods
        if ($is_blocked_method) {
            return 403 '{"jsonrpc":"2.0","error":{"code":-32601,"message":"Method not allowed"},"id":null}';
        }

        # Proxy to Geth
        proxy_pass http://geth_rpc;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 8 32k;

        # Cache immutable responses
        proxy_cache rpc_cache;
        proxy_cache_key "$rpc_method|$request_body";
        proxy_cache_valid 200 10m;
        proxy_no_cache $arg_nocache;
        proxy_cache_bypass $arg_nocache;
        add_header X-Cache-Status $upstream_cache_status;

        # Security headers
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
    }

    # ======================== WebSocket ========================
    location /ws {
        limit_req zone=ws_limit burst=20 nodelay;
        limit_conn ws_conn 50;

        proxy_pass http://geth_ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ======================== Health & Metrics ========================
    location /health {
        proxy_pass http://healthcheck_api/health;
        proxy_set_header Host $host;
        access_log off;
    }

    location /metrics {
        proxy_pass http://healthcheck_api/metrics;
        proxy_set_header Host $host;
        # Restrict metrics to internal or monitoring IPs
        # allow 10.0.0.0/8;
        # deny all;
    }

    # Block everything else
    location ~* ^/(admin|debug|api) {
        return 404;
    }

    # Nginx status for monitoring
    location /nginx_status {
        stub_status on;
        allow 127.0.0.1;
        allow 172.28.0.0/16;
        deny all;
        access_log off;
    }
}
