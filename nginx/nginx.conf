worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - [$time_local] "$request" '
                    '$status $body_bytes_sent '
                    '"$http_user_agent" '
                    'rt=$request_time urt=$upstream_response_time';

    log_format json_rpc '$remote_addr - [$time_local] '
                        'method=$rpc_method status=$status '
                        'rt=$request_time bytes=$body_bytes_sent';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;

    client_max_body_size 5m;
    client_body_buffer_size 128k;

    gzip on;
    gzip_types application/json;
    gzip_min_length 1000;

    # Upstream pools
    upstream geth_rpc {
        server geth:8545 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream geth_ws {
        server geth:8546;
    }

    upstream healthcheck_api {
        server healthcheck-svc:8080;
    }

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=rpc_limit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=ws_limit:10m rate=10r/s;
    limit_conn_zone $binary_remote_addr zone=ws_conn:10m;

    # Response caching for immutable data
    proxy_cache_path /var/cache/nginx/rpc levels=1:2
                     keys_zone=rpc_cache:10m max_size=1g
                     inactive=10m use_temp_path=off;

    include /etc/nginx/conf.d/*.conf;
}
